# Model arguments
model_name_or_path: meta-llama/Llama-3.2-3B-Instruct
model_revision: main
torch_dtype: bfloat16
attn_implementation: sdpa  # flash_attn deinstalliert

# Data training arguments
dataset_name: hiyouga/math12k #open-r1/DAPO-Math-17k-Processed #hiyouga/math12k #open-r1/OpenR1-Math-220k
dataset_test_split: test
dataset_prompt_column: problem
system_prompt: "You are a helpful AI Assistant that provides well-reasoned and detailed responses. You first think about the reasoning process as an internal monologue and then provide the user with the answer."

# GRPO trainer config
beta: 0.0
epsilon: 0.2
bf16: true
use_vllm: true
vllm_mode: colocate
vllm_gpu_memory_utilization: 0.7
vllm_tensor_parallel_size: 1
do_eval: true #false
eval_strategy: steps
eval_steps: 50
gradient_accumulation_steps: 4
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
learning_rate: 5.0e-07  
lr_scheduler_type: constant #cosine
log_completions: true
temperature: 1.0
log_level: info
logging_first_step: true
logging_steps: 25
logging_strategy: steps
loss_type: grpo
#scale_rewards: true
max_prompt_length: 512
max_completion_length: 3072
max_steps: 50 #1500 #-1
num_generations: 16
num_generations_eval: 4
num_train_epochs: 1
output_dir: /pfs/work9/workspace/scratch/ma_llincke-Results_Llama/Llama-3.2-3B-Instruct-GRPO-MATH12k-0320-constlr
overwrite_output_dir: true
per_device_train_batch_size: 4
steps_per_generation: 16
push_to_hub: false
report_to:
- wandb
wandb_project: open-r1-LLM_finetuning        # <-- Projektname in wandb
run_name: Llama-3.2-3B-Instruct-GRPO-MATH12k-offpolicy  # <-- Name des Runs
reward_funcs:
- accuracy
reward_weights:
- 1.0
save_strategy: "steps"
save_steps: 50  # Same as eval_steps to save at every evaluation
save_total_limit: 5  # Keep more checkpoints for model selection
seed: 42
warmup_ratio: 0.1
